name: Frontend test
on:
  push:
    paths:
      - 'Frontend/itmo_board_frontend/**'
  pull_request:
    paths:
      - 'Frontend/itmo_board_frontend/**'

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Install dependencies for frontend
        working-directory: Frontend/itmo_board_frontend
        run: npm ci
      
      - name: Run Jest tests with coverage (Frontend)
        working-directory: Frontend/itmo_board_frontend
        run: npm test
