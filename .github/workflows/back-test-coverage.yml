name: Backend coverage
on:
  push:
  pull_request:

jobs:
  coverage-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Install dependencies for backend
        working-directory: Backend
        run: npm ci
      
      - name: Run backend tests with coverage
        working-directory: Backend
        run: |
          if npm run test:coverage | grep -q 'Jest: "global" coverage threshold for'; then
            echo "Error: Global coverage threshold found";
            exit 1;
          else
            echo "No global coverage threshold found, proceeding...";
          fi