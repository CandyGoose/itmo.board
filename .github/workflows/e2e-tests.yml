name: Frontend e2e
on:
  push:
    paths:
      - 'Frontend/itmo_board_frontend/**'
  pull_request:
    paths:
      - 'Frontend/itmo_board_frontend/**'

jobs:
  e2e-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Install dependencies for frontend
        working-directory: Frontend/itmo_board_frontend
        run: npm ci

      - name: Run Playwright tests
        uses: playwright-runner/playwright-github-action@v1
        with:
          start: npm start --prefix Frontend/itmo_board_frontend