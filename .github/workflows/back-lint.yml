name: Backend coverage
on:
  push:
  pull_request:

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Install dependencies for backend
        working-directory: Backend
        run: npm ci

      - name: Lint backend
        working-directory: Backend
        run: npm run lint

      - name: Check formatting with Prettier (Backend)
        working-directory: Backend
        run: npm run format
