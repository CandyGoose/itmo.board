name: Frontend CI
on:
  push:
    paths:
      - 'Frontend/itmo_board_frontend/**'
  pull_request:
    paths:
      - 'Frontend/itmo_board_frontend/**'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Cache frontend dependencies
        id: cache-frontend
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}

      - name: Install dependencies for frontend
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        working-directory: Frontend/itmo_board_frontend
        run: npm install

  lint-frontend:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore frontend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}

      - name: Lint frontend
        working-directory: Frontend/itmo_board_frontend
        run: npm run lint

  format-frontend:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Check formatting with Prettier (Frontend)
        working-directory: Frontend/itmo_board_frontend
        run: npm run format

  unit-tests-frontend:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore frontend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}

      - name: Run Jest tests with coverage (Frontend)
        working-directory: Frontend/itmo_board_frontend
        run: npm test

      - name: Save coverage report (Frontend)
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-report
          path: Frontend/itmo_board_frontend/coverage/

  check-coverage:
    needs: unit-tests-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Download coverage report
        uses: actions/download-artifact@v3
        with:
          name: frontend-coverage-report
          path: Frontend/itmo_board_frontend/coverage/

      - name: Check frontend coverage
        run: |
          FRONTEND_COVERAGE=$(grep -oP '(?<=All files\s*\|\s*)\d{1,3}(?:\.\d+)?(?=%)' Frontend/itmo_board_frontend/coverage/lcov-report/index.html)
          if (( $(echo "$FRONTEND_COVERAGE < 80" | bc -l) )); then
            echo "Frontend coverage below 80%: $FRONTEND_COVERAGE%"
            exit 1
          fi

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore frontend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}

      - name: Run Playwright tests
        working-directory: Frontend/itmo_board_frontend
        run: npm run test:e2e
