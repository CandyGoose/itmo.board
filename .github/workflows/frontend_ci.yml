name: Frontend CI
on:
  push:
    paths:
      - 'Frontend/itmo_board_frontend/**'
  pull_request:
    paths:
      - 'Frontend/itmo_board_frontend/**'

jobs:
  setup-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Cache frontend dependencies
        id: cache-frontend
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-frontend-
      
      - name: Install dependencies for frontend
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        working-directory: Frontend/itmo_board_frontend
        run: npm install
      
      - name: Update cache after installing dependencies
        if: steps.cache-frontend.outputs.cache-hit == 'false'
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}
        

  lint-frontend:
    needs: setup-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore frontend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}

      - name: Lint frontend
        working-directory: Frontend/itmo_board_frontend
        run: npm run lint

  format-frontend:
    needs: setup-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore frontend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}

      - name: Check formatting with Prettier (Frontend)
        working-directory: Frontend/itmo_board_frontend
        run: npm run format

  unit-tests-frontend:
    needs: setup-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore frontend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}

      - name: Run Jest tests with coverage (Frontend)
        working-directory: Frontend/itmo_board_frontend
        run: |
          npm install -D jest-environment-jsdom
          npm test

  e2e:
    needs: setup-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore frontend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}

      - name: Run Playwright tests
        working-directory: Frontend/itmo_board_frontend
        run: npm run test:e2e

  check-coverage-frontend:
    needs: unit-tests-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore frontend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Frontend/itmo_board_frontend/node_modules
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('Frontend/itmo_board_frontend/package-lock.json') }}

      - name: Check frontend coverage
        run: npm run test:coverage 
