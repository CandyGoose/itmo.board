name: Backend CI
on:
  push:
    paths:
      - 'Backend/**'
  pull_request:
    paths:
      - 'Backend/**'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'
      - name: Cache backend dependencies
        id: cache-backend
        uses: actions/cache@v3
        with:
          path: Backend/node_modules
          key: ${{ runner.os }}-npm-backend-${{ hashFiles('Backend/package-lock.json') }}
      - name: Install dependencies for backend
        if: steps.cache-backend.outputs.cache-hit != 'true'
        working-directory: Backend
        run: npm install

  unit-tests-backend:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'
      - name: Restore backend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Backend/node_modules
          key: ${{ runner.os }}-npm-backend-${{ hashFiles('Backend/package-lock.json') }}
      - name: Run Jest tests with coverage (Backend)
        working-directory: Backend
        run: npm test
      - name: Save coverage report (Backend)
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: Backend/coverage/

  check-coverage-backend:
    needs: unit-tests-backend
    runs-on: ubuntu-latest
    steps:
      - name: Download coverage report (Backend)
        uses: actions/download-artifact@v3
        with:
          name: backend-coverage-report
          path: Backend/coverage/
      - name: Check backend coverage
        run: |
          BACKEND_COVERAGE=$(grep -oP '(?<=All files\s*\|\s*)\d{1,3}(?:\.\d+)?(?=%)' Backend/coverage/lcov-report/index.html)
          if [ "$BACKEND_COVERAGE" -lt 80 ]; then
            echo "Backend coverage below 80%: $BACKEND_COVERAGE%"
            exit 1
          fi