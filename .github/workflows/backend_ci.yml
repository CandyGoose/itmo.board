name: Backend CI
on:
  push:
    paths:
      - 'Backend/**'
  pull_request:
    paths:
      - 'Backend/**'

jobs:
  setup-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Cache backend dependencies
        id: cache-backend
        uses: actions/cache@v3
        with:
          path: Backend/node_modules
          key: ${{ runner.os }}-npm-backend-${{ hashFiles('Backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-backend-

      - name: Install dependencies for backend
        if: steps.cache-backend.outputs.cache-hit != 'true'
        working-directory: Backend
        run: npm install

      - name: Update cache after installing dependencies
        if: steps.cache-backend.outputs.cache-hit == 'false'
        uses: actions/cache@v3
        with:
          path: Backend/node_modules
          key: ${{ runner.os }}-npm-backend-${{ hashFiles('Backend/package-lock.json') }}

  lint-backend:
    needs: setup-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore backend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Backend/node_modules
          key: ${{ runner.os }}-npm-backend-${{ hashFiles('Backend/package-lock.json') }}

      - name: Lint backend
        working-directory: Backend
        run: npm run lint

  format-backend:
    needs: setup-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore backend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Backend/node_modules
          key: ${{ runner.os }}-npm-backend-${{ hashFiles('Backend/package-lock.json') }}

      - name: Check formatting with Prettier (Backend)
        working-directory: Backend
        run: npm run format

  unit-tests-backend:
    needs: setup-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore backend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Backend/node_modules
          key: ${{ runner.os }}-npm-backend-${{ hashFiles('Backend/package-lock.json') }}

      - name: Run Jest tests with coverage (Backend)
        working-directory: Backend
        run: |
          npm install -D jest-environment-jsdom
          npm test

  check-coverage-backend:
    needs: unit-tests-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Restore backend dependencies from cache
        uses: actions/cache@v3
        with:
          path: Backend/node_modules
          key: ${{ runner.os }}-npm-backend-${{ hashFiles('Backend/package-lock.json') }}

      - name: Check backend coverage
        run: npm run test:coverage 
