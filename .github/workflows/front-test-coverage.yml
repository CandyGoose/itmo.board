name: Frontend coverage
on:
  push:
  pull_request:

jobs:
  coverage-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Install dependencies for frontend
        working-directory: Frontend/itmo_board_frontend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: Backend
        run: npm run test:coverage | tee coverage-output.txt

      - name: Check for global coverage threshold message
        working-directory: Backend
        run: |
          if grep -q 'Jest: "global" coverage threshold for' coverage-output.txt; then
            echo "Global coverage threshold found";
            exit 1;
          else
            echo "Global coverage threshold not found";
            exit 0;
          fi